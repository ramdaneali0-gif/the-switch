<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Switch</title>
    <!-- Tailwind CSS pour un design propre -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Styles personnalisés pour l'effet de lueur de l'ampoule */
        .lightbulb {
            transition: all 0.3s ease;
            font-size: 7rem;
            cursor: pointer;
            user-select: none;
        }
        .lightbulb.off {
            filter: drop-shadow(0 0 0px rgba(0, 0, 0, 0));
            opacity: 0.3;
        }
        .lightbulb.on {
            filter: drop-shadow(0 0 35px #fbbf24) drop-shadow(0 0 70px #f59e0b);
            opacity: 1;
            transform: scale(1.05);
        }
    </style>
</head>
<body id="body" class="bg-stone-950 min-h-screen flex flex-col items-center justify-between font-sans transition-colors duration-500">

    <!-- Header principal avec le compteur total en haut -->
    <header class="w-full text-center py-6 border-b border-stone-900 bg-stone-950/80 backdrop-blur-md sticky top-0 z-50 flex flex-col items-center gap-2">
        <h1 class="text-white font-black text-2xl tracking-wider">THE SWITCH</h1>
        <div class="flex items-center gap-3 mt-1">
            <span id="status-message" class="text-stone-400 text-sm">Connexion...</span>
            <span id="click-counter" class="text-xs bg-amber-500 text-stone-950 px-2.5 py-1 rounded-full font-black tracking-wide shadow-md">0 CLICS</span>
        </div>
    </header>

    <!-- Zone centrale de l'ampoule -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 w-full">
        <div class="relative flex flex-col items-center">
            <!-- Notre élément Ampoule cliquable -->
            <div id="the-switch" class="lightbulb off select-none">💡</div>
            <p class="text-stone-500 text-xs mt-8 tracking-widest uppercase font-medium">1 clic maximum par minute</p>
        </div>
    </main>

    <!-- Footer discret pour équilibrer le design flex-between -->
    <footer class="py-4 text-center w-full">
        <p class="text-stone-700 text-[10px] tracking-widest uppercase">Édition Limitée</p>
    </footer>

    <!-- Script Socket.io fourni par le CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Détection de l'adresse du serveur (Localhost ou Render)
        const SERVER_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://the-switch-server.onrender.com';

        // Initialisation de la connexion websocket
        const socket = io(SERVER_URL);

        // Récupération des éléments de l'interface
        const body = document.getElementById('body');
        const btn = document.getElementById('the-switch');
        const statusMessage = document.getElementById('status-message');
        const clickCounter = document.getElementById('click-counter');

        // Événement : Clic sur l'ampoule
        btn.addEventListener('click', () => {
            socket.emit('click');
        });

        // Réception de l'état initial au chargement
        socket.on('init_state', (data) => {
            updateInterface(data.isLightOn, data.clickCount);
        });

        // Réception d'une mise à jour en temps réel suite à un clic
        socket.on('update_state', (data) => {
            updateInterface(data.isLightOn, data.clickCount);
        });

        // Fonction centrale pour modifier le look de la page et du compteur
        function updateInterface(isOn, count) {
            clickCounter.textContent = `${count} CLICS`;

            if (isOn) {
                btn.classList.add('on');
                btn.classList.remove('off');
                body.classList.remove('bg-stone-950');
                body.classList.add('bg-stone-900');
                statusMessage.textContent = "Lumière Allumée";
                statusMessage.className = "text-amber-400 text-sm font-bold";
            } else {
                btn.classList.add('off');
                btn.classList.remove('on');
                body.classList.remove('bg-stone-900');
                body.classList.add('bg-stone-950');
                statusMessage.textContent = "Lumière Éteinte";
                statusMessage.className = "text-stone-400 text-sm font-medium";
            }
        }
    </script>
</body>
</html>
