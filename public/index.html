<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Raid - MMORPG</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .boss-btn {
            transition: transform 0.05s ease;
            font-size: 9rem;
            user-select: none;
        }
        .boss-btn:active {
            transform: scale(0.85) rotate(3deg);
        }
        /* Flash rouge sur l'écran lors d'un coup critique global */
        .crit-flash {
            animation: flashEffect 0.2s ease-out;
        }
        @keyframes flashEffect {
            0% { background-color: rgba(220, 38, 38, 0.4); }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="bg-stone-950 min-h-screen flex flex-col items-center justify-between font-sans text-white relative overflow-x-hidden">

    <div id="crit-overlay" class="absolute inset-0 pointer-events-none z-40 transition-colors duration-100"></div>

    <header class="w-full border-b border-stone-900 bg-stone-900/40 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="font-black text-2xl tracking-tighter text-red-600">TITAN RAID</h1>
            <p id="live-indicator" class="text-[10px] text-stone-500 uppercase font-black tracking-widest mt-0.5">En attente...</p>
        </div>
        
        <div class="flex gap-3">
            <div class="bg-stone-900/80 px-3 py-1 rounded-lg border border-stone-800 text-center">
                <span class="text-stone-500 text-[9px] block uppercase font-bold">Dégâts / Clic</span>
                <span id="stat-dmg" class="font-bold text-sm">10</span>
            </div>
            <div class="bg-stone-900/80 px-3 py-1 rounded-lg border border-stone-800 text-center">
                <span class="text-stone-500 text-[9px] block uppercase font-bold">Chances Crit</span>
                <span id="stat-crit" class="font-bold text-sm text-red-400">5%</span>
            </div>
            <div class="bg-stone-900 px-3 py-1 rounded-lg border border-stone-800 text-center min-w-[90px]">
                <span class="text-stone-500 text-[9px] block uppercase font-bold">Trésor</span>
                <span id="player-gold" class="font-black text-sm text-amber-400">0 🪙</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-md gap-6 z-10">
        
        <div class="text-center w-full">
            <h2 id="boss-name" class="font-black text-3xl tracking-tight text-stone-100">Recherche de cible...</h2>
            <p id="boss-level" class="text-xs font-black text-red-500 tracking-widest uppercase mt-1">NIVEAU 1</p>
        </div>

        <div class="w-full bg-stone-900 border border-stone-800 p-1 rounded-xl h-7 relative shadow-2xl overflow-hidden">
            <div id="hp-bar" class="bg-gradient-to-r from-red-700 to-red-500 h-full rounded-lg transition-all duration-75 w-full"></div>
            <span id="hp-text" class="absolute inset-0 flex items-center justify-center text-xs font-black drop-shadow-[0_1.5px_2px_rgba(0,0,0,1)]">0 / 0 HP</span>
        </div>

        <div class="my-6 relative flex flex-col items-center">
            <div id="damage-popup" class="absolute -top-10 font-black text-2xl opacity-0 transition-all duration-200 pointer-events-none select-none"></div>
            <button id="boss-button" class="boss-btn cursor-pointer focus:outline-none">🌋</button>
        </div>

    </main>

    <section class="w-full max-w-md bg-stone-900 border-t border-stone-800 rounded-t-3xl p-5 flex flex-col gap-4 shadow-2xl z-10">
        <h3 class="text-xs font-black tracking-widest text-stone-400 uppercase text-center">Améliorations de Combat</h3>
        
        <div class="grid grid-cols-2 gap-3">
            <button id="up-dmg-btn" class="bg-stone-950 border border-stone-800 p-3 rounded-2xl flex flex-col items-center gap-1 hover:border-red-600 transition cursor-pointer">
                <span class="text-xl">💪</span>
                <span class="text-xs font-bold text-stone-200">Force Brute</span>
                <span class="text-[10px] text-stone-400 font-medium">+8 Dégâts de base</span>
                <span id="up-dmg-cost" class="text-xs font-black text-amber-500 bg-amber-500/10 px-2.5 py-0.5 rounded-md mt-1">30 🪙</span>
            </button>

            <button id="up-crit-btn" class="bg-stone-950 border border-stone-800 p-3 rounded-2xl flex flex-col items-center gap-1 hover:border-red-600 transition cursor-pointer">
                <span class="text-xl">🎯</span>
                <span class="text-xs font-bold text-stone-200">Précision Mortelle</span>
                <span class="text-[10px] text-stone-400 font-medium">+3% Taux Critique</span>
                <span id="up-crit-cost" class="text-xs font-black text-amber-500 bg-amber-500/10 px-2.5 py-0.5 rounded-md mt-1">50 🪙</span>
            </button>
        </div>
    </section>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const SERVER_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://the-switch-server.onrender.com';

        const socket = io(SERVER_URL);

        const bossButton = document.getElementById('boss-button');
        const bossName = document.getElementById('boss-name');
        const bossLevel = document.getElementById('boss-level');
        const hpBar = document.getElementById('hp-bar');
        const hpText = document.getElementById('hp-text');
        
        const playerGold = document.getElementById('player-gold');
        const statDmg = document.getElementById('stat-dmg');
        const statCrit = document.getElementById('stat-crit');
        const liveIndicator = document.getElementById('live-indicator');
        
        const upDmgBtn = document.getElementById('up-dmg-btn');
        const upCritBtn = document.getElementById('up-crit-btn');
        const upDmgCost = document.getElementById('up-dmg-cost');
        const upCritCost = document.getElementById('up-crit-cost');
        
        const critOverlay = document.getElementById('crit-overlay');
        const damagePopup = document.getElementById('damage-popup');

        bossButton.addEventListener('click', () => socket.emit('attack_boss'));
        upDmgBtn.addEventListener('click', () => socket.emit('upgrade_stat', 'damage'));
        upCritBtn.addEventListener('click', () => socket.emit('upgrade_stat', 'crit'));

        socket.on('init_game', (data) => {
            liveIndicator.textContent = "Serveur Synchro ⚔️";
            liveIndicator.className = "text-[10px] text-emerald-500 uppercase font-black tracking-widest mt-0.5";
            updateBossUI(data.boss);
            updatePlayerUI(data.player);
        });

        socket.on('boss_updated', (data) => {
            const percentage = (data.hp / data.maxHp) * 100;
            hpBar.style.width = `${Math.max(0, percentage)}%`;
            hpText.textContent = `${Math.max(0, data.hp)} / ${data.maxHp} HP`;
        });

        socket.on('boss_defeated', (data) => {
            updateBossUI(data.boss);
        });

        socket.on('player_updated', (data) => {
            updatePlayerUI(data);
        });

        // Gestion des effets visuels d'impact (Mondial)
        socket.on('damage_effect', (data) => {
            if (data.isCrit) {
                // Effet flash rouge sur l'écran
                critOverlay.classList.add('crit-flash');
                setTimeout(() => critOverlay.classList.remove('crit-flash'), 200);

                // Popup text critique
                damagePopup.textContent = `CRIT ! -${data.damage}`;
                damagePopup.className = "absolute -top-12 font-black text-3xl text-red-500 tracking-tighter drop-shadow-md opacity-100 scale-110 transition-all duration-75";
            } else {
                // Popup normal
                damagePopup.textContent = `-${data.damage}`;
                damagePopup.className = "absolute -top-10 font-bold text-xl text-stone-300 opacity-100 scale-100 transition-all duration-75";
            }

            // Disparition douce de l'indicateur de dégât
            setTimeout(() => {
                damagePopup.classList.add('opacity-0', '-translate-y-4');
            }, 100);
        });

        function updateBossUI(bossData) {
            bossName.textContent = bossData.name;
            bossLevel.textContent = `TITAN NIVEAU ${bossData.level}`;
            bossButton.textContent = bossData.emoji;

            const percentage = (bossData.hp / bossData.maxHp) * 100;
            hpBar.style.width = `${percentage}%`;
            hpText.textContent = `${bossData.hp} / ${bossData.maxHp} HP`;
        }

        function updatePlayerUI(p) {
            playerGold.textContent = `${p.gold} 🪙`;
            statDmg.textContent = p.stats.baseDmg;
            statCrit.textContent = `${p.stats.critChance}%`;

            // Recalcul des coûts dynamiques des upgrades locaux
            const costDmg = Math.floor(30 * Math.pow(1.5, p.damageLevel - 1));
            const costCrit = Math.floor(50 * Math.pow(1.6, p.critLevel - 1));

            upDmgCost.textContent = `${costDmg} 🪙`;
            upCritCost.textContent = p.stats.critChance >= 100 ? "MAX" : `${costCrit} 🪙`;
        }
    </script>
</body>
</html>
