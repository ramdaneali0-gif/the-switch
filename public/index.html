<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Switch - L'Interrupteur Mondial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body id="body" class="light-off h-screen flex overflow-hidden m-0 font-sans transition-colors duration-500">

    <div class="flex-1 flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black mb-12 tracking-wider uppercase">The Switch</h1>
        
        <button id="the-switch" class="switch-btn w-64 h-64 rounded-full border-8 text-3xl font-black uppercase tracking-widest hover:scale-105 active:scale-95 focus:outline-none shadow-2xl">
            OFF
        </button>
        
        <p id="status-message" class="mt-8 text-sm opacity-60 text-center max-w-xs leading-relaxed">
            Cliquez pour changer l'état du monde.<br>Attention, un seul clic par personne.
        </p>
    </div>

    <div class="w-80 sm:w-96 bg-stone-900 border-l border-stone-800 flex flex-col h-full text-white shadow-2xl">
        <div class="p-6 border-b border-stone-800 bg-stone-950/40">
            <h2 class="text-xl font-bold flex items-center justify-between">
                <span>Flux Mondial</span>
                <span id="click-counter" class="text-xs bg-amber-500 text-stone-950 px-2 py-1 rounded-full font-black">0 CLIC</span>
            </h2>
            <p class="text-xs text-stone-400 mt-1">Activité des utilisateurs en temps réel</p>
        </div>

        <div id="logs-container" class="flex-1 overflow-y-auto p-4 space-y-3">
            <div id="no-activity" class="text-center text-sm text-stone-500 my-8">Aucun clic enregistré pour le moment...</div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    // En local, on laisse vide. Quand ton serveur sera en ligne (sur Render par exemple),
    // tu remplaceras l'adresse ci-dessous par l'URL fournie par ton hébergeur Back-end.
   const SERVER_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://the-switch-server.onrender.com';
    const socket = io(SERVER_URL);

        // Récupération des éléments HTML
        const body = document.getElementById('body');
        const btn = document.getElementById('the-switch');
        const statusMessage = document.getElementById('status-message');
        const clickCounter = document.getElementById('click-counter');
        const logsContainer = document.getElementById('logs-container');
        const noActivityDiv = document.getElementById('no-activity');

        // Fonction pour mettre à jour l'application visuellement (Mode ON / Mode OFF)
        function updateVisuals(isAllumed) {
            if (isAllumed) {
                body.classList.remove('light-off');
                body.classList.add('light-on');
                btn.innerText = "ON";
            } else {
                body.classList.remove('light-on');
                body.classList.add('light-off');
                btn.innerText = "OFF";
            }
        }

        // Événement 1 : Initialisation à l'ouverture de la page
        socket.on('init_state', (data) => {
            updateVisuals(data.state);
            
            // Si l'IP du joueur a déjà cliqué dans le passé, on bloque direct son bouton
            if (data.hasClicked) {
                disableMyButton();
            }
        });

        // Événement 2 : Envoi du clic au serveur quand on appuie sur le bouton
        btn.addEventListener('click', () => {
            socket.emit('switch_clicked');
        });

        // Événement 3 : Réception d'une mise à jour mondiale (quand n'importe qui clique)
        socket.on('switch_updated', (data) => {
            // 1. On change la lumière générale du site
            updateVisuals(data.state);

            // 2. On met à jour le compteur global de clics
            clickCounter.innerText = `${data.totalClicks} ${data.totalClicks > 1 ? 'CLICS' : 'CLIC'}`;

            // 3. On vire le message "Aucun clic" si c'est le tout premier clic du serveur
            if (noActivityDiv) noActivityDiv.remove();

            // 4. On crée graphiquement la nouvelle ligne dans le panel de droite
            const actionText = data.state ? "allumé" : "éteint";
            const indicatorColor = data.state ? "bg-yellow-400" : "bg-stone-600";

            const logLine = document.createElement('div');
            logLine.className = "bg-stone-950/40 p-3 rounded-lg border border-stone-800/60 flex items-start space-x-3 text-sm animate-fade-in";
            logLine.innerHTML = `
                <span class="w-2 h-2 rounded-full ${indicatorColor} mt-1.5 flex-shrink-0 animate-ping"></span>
                <div class="flex-1">
                    <p class="font-medium text-stone-200">Bouton ${actionText}</p>
                    <p class="text-xs text-stone-400 font-semibold">${data.location.city}, ${data.location.country}</p>
                </div>
                <span class="text-xs text-stone-500 font-mono">${data.time}</span>
            `;

            // On l'ajoute tout en haut de la liste (ordre chronologique inverse)
            logsContainer.insertBefore(logLine, logsContainer.firstChild);
        });

        // Événement 4 : Reçu uniquement par celui qui vient de cliquer pour désactiver son bouton
        socket.on('disable_button', () => {
            disableMyButton();
        });

        // Événement 5 : Sécurité si quelqu'un essaie de forcer le clic en modifiant le code HTML
        socket.on('error_message', (msg) => {
            alert(msg);
        });

        // Fonction pour griser le bouton et bloquer les intéractions
        function disableMyButton() {
            btn.disabled = true;
            btn.classList.add('opacity-40', 'cursor-not-allowed', 'hover:scale-100', 'active:scale-100');
            statusMessage.innerText = "Votre unique choix a été enregistré. Vous ne pouvez plus interagir.";
            statusMessage.classList.add('text-amber-500', 'font-semibold');
        }
    </script>
</body>
</html>
